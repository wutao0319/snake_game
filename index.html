<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="header">
        <div>
          <h1>贪吃蛇</h1>
          <p>方向键 / WASD 控制移动，空格暂停。</p>
        </div>
        <div class="score-board">
          <span>分数</span>
          <strong id="score">0</strong>
        </div>
      </div>

      <div class="controls">
        <button id="start-btn" type="button">开始游戏</button>
        <button id="pause-btn" type="button">暂停</button>
        <button id="restart-btn" type="button">重新开始</button>
      </div>

      <div class="status-bar">
        <span id="status">点击“开始游戏”开始</span>
      </div>

      <canvas id="game" width="400" height="400" aria-label="贪吃蛇游戏画布"></canvas>

      <div class="tips">
        <p>规则：吃到食物得分，撞墙或撞到自己则游戏结束。</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
